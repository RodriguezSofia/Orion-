{% extends 'base.html' %}

{% block title %}Restablecer Contraseña - ARION{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center my-5">
    <div class="col-12 col-sm-8 col-md-6 col-lg-4">
        
        <div class="card border-0 shadow-sm rounded-4 p-4 p-sm-5 bg-white">
            
            <div class="text-center mb-4">
                <div class="bg-primary-subtle text-primary rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 56px; height: 56px;">
                    <i class="bi bi-envelope-open fs-3"></i>
                </div>
                <h2 class="fw-black text-dark h4 m-0">Reset password</h2>
                <p class="text-muted small mt-1">We'll send you a link to reset it</p>
            </div>

            <div id="auth-state-container">
                
                <form id="forgot-password-form" class="d-flex flex-column gap-3 text-start">
                    <div class="mb-2">
                        <label for="email" class="form-label small fw-medium text-dark mb-1">Email address</label>
                        <div class="position-relative">
                            <span class="position-absolute top-50 start-0 translate-middle-y ps-3 text-muted z-3" style="pointer-events: none; line-height: 0;">
                                <i class="bi bi-envelope"></i>
                            </span>
                            <input 
                                id="email" 
                                name="email" 
                                type="email" 
                                autocomplete="email" 
                                class="form-control rounded-3" 
                                placeholder="you@example.com" 
                                style="height: 46px; padding-left: 42px;"
                                required 
                                autofocus
                            >
                        </div>
                    </div>

                    <button type="submit" id="submit-btn" class="btn btn-primary w-100 fw-medium mt-2 rounded-3 d-flex align-items-center justify-content-center gap-2 shadow-sm" style="height: 46px;">
                        <span id="btn-text">Send reset link</span>
                        <div id="btn-spinner" class="spinner-border spinner-border-sm d-none" role="status"></div>
                    </button>
                </form>

            </div>

            <div class="text-center mt-4 small">
                <a href="{{ url_for('login') }}" class="text-primary fw-medium text-decoration-none hover-underline d-inline-flex align-items-center gap-1">
                    <i class="bi bi-arrow-left" style="font-size: 0.85rem; line-height: 0;"></i> Back to log in
                </a>
            </div>

        </div>
    </div>
</div>

<script>
    document.getElementById('forgot-password-form').addEventListener('submit', async function(e) {
        e.preventDefault(); // Evita que la página se recargue automáticamente
        
        const emailInput = document.getElementById('email').value;
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');
        const stateContainer = document.getElementById('auth-state-container');

        // 1. ACTIVAR ESTADO DE CARGA (loading = true)
        submitBtn.disabled = true;
        btnText.textContent = "Sending...";
        btnSpinner.classList.remove('d-none'); // Muestra el spinner de Bootstrap

        try {
            // Aquí puedes conectar tu API de Flask en el futuro mediante fetch si es necesario
            // await fetch('/api/reset-password', { method: 'POST', body: JSON.stringify({ email: emailInput }) });
            
            // Simulación de retraso de red de 1.2 segundos igual que en React
            await new Promise(resolve => setTimeout(resolve, 1200)); 
        } catch (error) {
            // El bloque try-catch original siempre da éxito visual por seguridad (con fines de privacidad)
        } finally {
            // 2. ACTIVAR ESTADO DE ENVIADO (sent = true)
            // Reemplazamos el formulario por el mensaje de éxito sin recargar la página
            stateContainer.innerHTML = `
                <p class="text-sm text-dark text-center m-0 py-3 style-success-msg" style="font-size: 0.9rem; line-height: 1.5;">
                    If an account exists with that email, you'll receive a password reset link shortly.
                </p>
            `;
        }
    });
</script>

<style>
    /* Transición suave para emular framer-motion de forma minimalista */
    .style-success-msg {
        animation: fadeIn 0.4s ease-out;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}
